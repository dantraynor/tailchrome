name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Other
    validations:
      required: true
  - type: input
    id: browser-version
    attributes:
      label: Browser Version
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15.2, Windows 11
  - type: input
    id: extension-version
    attributes:
      label: Extension Version
  - type: textarea
    id: logs
    attributes:
      label: Console Logs / Errors
      render: shell
