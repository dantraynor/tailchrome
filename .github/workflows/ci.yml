name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.filter.outputs.host }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            host:
              - 'host/**'
              - 'Makefile'

  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:ids
      - run: pnpm typecheck
      - run: pnpm test

  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:chrome
      - uses: actions/upload-artifact@v6
        with:
          name: chrome-build
          path: packages/extension/.output/chrome-mv3/

  review-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm review:firefox
      - uses: actions/upload-artifact@v6
        with:
          name: firefox-build
          path: packages/extension/.output/firefox-mv3/

  host-build:
    needs: changes
    if: needs.changes.outputs.host == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum
      - run: go mod download
        working-directory: host
      - run: make host
      - uses: actions/upload-artifact@v6
        with:
          name: host-binary
          path: dist/tailscale-browser-ext
