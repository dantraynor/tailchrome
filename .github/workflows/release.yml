name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to release, for example v0.1.5
        required: true
        type: string

permissions:
  contents: write

# Required repository secrets:
#   APPLE_CERTIFICATE_P12        - base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD   - password for the .p12
#   APPLE_API_KEY_ID             - App Store Connect API key ID
#   APPLE_API_ISSUER_ID          - App Store Connect API issuer UUID
#   APPLE_API_KEY_P8             - contents of the AuthKey_*.p8 file
# Optional repository secrets:
#   WINDOWS_CODESIGN_P12_BASE64  - base64-encoded Windows code-signing .p12/.pfx
#   WINDOWS_CODESIGN_PASSWORD    - password for the Windows signing certificate

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: corepack enable
      - uses: actions/setup-go@v6
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum
      - run: pnpm install --frozen-lockfile
      - run: go mod download
        working-directory: host
      - run: pnpm validate:ids
      - run: pnpm validate:release-tag "$RELEASE_TAG"
      - run: pnpm zip:chrome
      - run: pnpm zip:firefox
      - run: make host-all
      - name: Verify Firefox source ZIP rebuild
        run: |
          set -euo pipefail
          ORIGINAL_DIR="$RUNNER_TEMP/firefox-original"
          SOURCE_DIR="$RUNNER_TEMP/firefox-source"
          REBUILT_DIR="$RUNNER_TEMP/firefox-rebuilt"
          rm -rf "$ORIGINAL_DIR" "$SOURCE_DIR" "$REBUILT_DIR"
          mkdir -p "$ORIGINAL_DIR" "$SOURCE_DIR" "$REBUILT_DIR"
          unzip -q packages/extension/.output/firefox.zip -d "$ORIGINAL_DIR"
          unzip -q packages/extension/.output/firefox-sources.zip -d "$SOURCE_DIR"
          pushd "$SOURCE_DIR" >/dev/null
          pnpm install --frozen-lockfile
          pnpm --filter @tailchrome/extension zip:firefox
          unzip -q packages/extension/.output/firefox.zip -d "$REBUILT_DIR"
          diff -qr "$ORIGINAL_DIR" "$REBUILT_DIR"
          popd >/dev/null
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          retention-days: 1
          path: |
            dist/tailscale-browser-ext-darwin-amd64
            dist/tailscale-browser-ext-darwin-arm64
            dist/tailscale-browser-ext-linux-amd64
            dist/tailscale-browser-ext-windows-amd64.exe
            packages/extension/.output/chrome.zip
            packages/extension/.output/firefox.zip
            packages/extension/.output/firefox-sources.zip

  sign-macos:
    needs: build
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-output

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"
          # Avoid echo (trailing newline / echo quirks); strip accidental CR/LF from secret paste
          CERT_PASS="${APPLE_CERTIFICATE_PASSWORD%$'\r'}"
          CERT_PASS="${CERT_PASS%$'\n'}"

          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERT_PASS" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Codesign Darwin binaries
        run: |
          set -euo pipefail
          IDENTITY="Developer ID Application: Daniel David Traynor (UL9B796XFN)"
          for bin in dist/tailscale-browser-ext-darwin-amd64 dist/tailscale-browser-ext-darwin-arm64; do
            chmod +x "$bin"
            codesign --force --timestamp --options runtime --sign "$IDENTITY" "$bin"
            codesign -dvv "$bin"
          done

      - name: Notarize Darwin binaries
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_PATH"

          for bin in dist/tailscale-browser-ext-darwin-amd64 dist/tailscale-browser-ext-darwin-arm64; do
            ZIP="${bin}.zip"
            cd "$(dirname "$bin")"
            zip "$(basename "$ZIP")" "$(basename "$bin")"
            cd -

            xcrun notarytool submit "$ZIP" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --wait
          done

      - name: Upload signed Darwin binaries
        uses: actions/upload-artifact@v6
        with:
          name: signed-darwin
          retention-days: 1
          path: |
            dist/tailscale-browser-ext-darwin-amd64
            dist/tailscale-browser-ext-darwin-arm64

  package-linux:
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-output
      - name: Install nFPM
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - name: Build Linux packages
        run: VERSION="$RELEASE_TAG" ./packaging/linux/build-packages.sh
      - name: Upload Linux packages
        uses: actions/upload-artifact@v6
        with:
          name: linux-packages
          retention-days: 1
          path: |
            dist/tailchrome-helper-linux-amd64.deb
            dist/tailchrome-helper-linux-x86_64.rpm

  package-windows:
    needs: build
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-output
      - name: Install WiX
        run: dotnet tool install --global wix --version 6.0.2
      - name: Build Windows MSI
        shell: pwsh
        run: .\packaging\windows\build-msi.ps1 -Version "$env:RELEASE_TAG"
      - name: Sign Windows MSI
        shell: pwsh
        env:
          WINDOWS_CODESIGN_P12_BASE64: ${{ secrets.WINDOWS_CODESIGN_P12_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_P12_BASE64)) {
            Write-Host "Skipping Windows signing; WINDOWS_CODESIGN_P12_BASE64 is not configured."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "tailchrome-windows-codesign.p12"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_P12_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found"
          }
          & $signtool.FullName sign `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /f $certPath `
            /p "$env:WINDOWS_CODESIGN_PASSWORD" `
            dist\tailchrome-helper-windows-x64.msi
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v6
        with:
          name: windows-msi
          retention-days: 1
          path: dist/tailchrome-helper-windows-x64.msi

  release:
    needs: [build, sign-macos, package-linux, package-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      # gh resolves repo via git remote; this job has no checkout (artifacts only).
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: build-output

      - name: Download signed Darwin binaries
        uses: actions/download-artifact@v6
        with:
          name: signed-darwin
          path: signed-darwin

      - name: Download Linux packages
        uses: actions/download-artifact@v6
        with:
          name: linux-packages
          path: linux-packages

      - name: Download Windows MSI
        uses: actions/download-artifact@v6
        with:
          name: windows-msi
          path: windows-msi

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release
          # actions/upload-artifact strips the common-ancestor prefix when
          # all uploaded paths share one. signed-darwin uploads two dist/...
          # files, so dist/ is stripped and the artifact's contents are flat
          # — they extract straight into signed-darwin/.
          cp signed-darwin/tailscale-browser-ext-darwin-amd64 release/
          cp signed-darwin/tailscale-browser-ext-darwin-arm64 release/
          cp linux-packages/tailchrome-helper-linux-amd64.deb release/
          cp linux-packages/tailchrome-helper-linux-x86_64.rpm release/
          cp windows-msi/tailchrome-helper-windows-x64.msi release/
          # build-output uploads paths under both dist/ and packages/, so it
          # has no common ancestor and the artifact preserves the full paths.
          cp dist/tailscale-browser-ext-linux-amd64 release/
          cp dist/tailscale-browser-ext-windows-amd64.exe release/
          cp packages/extension/.output/chrome.zip release/
          cp packages/extension/.output/firefox.zip release/
          cp packages/extension/.output/firefox-sources.zip release/
          cd release
          sha256sum $(ls -1 | sort) > SHA256SUMS.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release -maxdepth 1 -type f | sort)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$RELEASE_TAG" --generate-notes --draft
          fi

      - name: Write workflow summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Release Assets"
            echo
            echo "Release: $(gh release view "$RELEASE_TAG" --json url --jq '.url')"
            echo
            echo "The macOS installer job uploads \`tailchrome-helper-macos.pkg\` separately."
            echo
            echo '```'
            ls -1 release | sort
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  release-macos-pkg:
    needs: release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: host/go.mod
          cache-dependency-path: host/go.sum
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"
          CERT_PASS="${APPLE_CERTIFICATE_PASSWORD%$'\r'}"
          CERT_PASS="${CERT_PASS%$'\n'}"

          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$CERT_PASS" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build macOS installer package
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          MACOS_SIGN_APPLICATION_IDENTITY: "Developer ID Application: Daniel David Traynor (UL9B796XFN)"
          MACOS_SIGN_INSTALLER_IDENTITY: "Developer ID Installer: Daniel David Traynor (UL9B796XFN)"
        run: ./packaging/macos/build-pkg.sh

      - name: Notarize macOS package
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8" > "$KEY_PATH"
          xcrun notarytool submit dist/tailchrome-helper-macos.pkg \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple dist/tailchrome-helper-macos.pkg

      - name: Verify package signature
        run: |
          pkgutil --check-signature dist/tailchrome-helper-macos.pkg

      - name: SHA256 of macOS package
        run: (cd dist && shasum -a 256 tailchrome-helper-macos.pkg | tee tailchrome-helper-macos.pkg.sha256)

      - name: Upload macOS assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dist/tailchrome-helper-macos.pkg \
            dist/tailchrome-helper-macos.pkg.sha256 \
            --clobber

      - name: macOS release summary
        run: |
          {
            echo "## macOS installer"
            echo
            echo '```'
            cat dist/tailchrome-helper-macos.pkg.sha256
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
